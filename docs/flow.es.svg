<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1268" font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="0.28" cy="0" r="1.1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="0.6" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect x="1" y="1" width="1438" height="1266" rx="20" fill="#0d1117" stroke="#1f2733" stroke-width="2"/>
  <rect x="1" y="1" width="1438" height="1266" rx="20" fill="url(#glow)"/>

  <!-- header -->
  <text x="66" y="86" font-size="15" font-weight="700" letter-spacing="4" fill="#58a6ff">DEL REEL AL ARCHIVO</text>
  <text x="64" y="132" font-size="33" font-weight="700" fill="#e6edf3">Cómo una captura se vuelve una descarga</text>

  <!-- ===== TARJETAS DE PASO ===== -->

  <!-- PASO 1  top 190 -->
  <rect x="64" y="190" width="1312" height="116" rx="16" fill="#0f151d" stroke="#1f2733" stroke-width="1.5"/>
  <rect x="82" y="222" width="6" height="52" rx="3" fill="#58a6ff"/>
  <circle cx="126" cy="248" r="22" fill="#58a6ff" fill-opacity="0.12" stroke="#58a6ff" stroke-width="2"/>
  <text x="126" y="256" font-size="21" font-weight="700" fill="#58a6ff" text-anchor="middle">1</text>
  <text x="172" y="240" font-size="21" font-weight="600" fill="#e6edf3">Reprodúcelo en Facebook</text>
  <text x="172" y="270" font-size="16" fill="#8b949e">Un reel, historia o destacada se reproduce en la pestaña — FaceScrap nunca toca el reproductor.</text>
  <rect x="1142" y="231" width="206" height="34" rx="17" fill="#58a6ff" fill-opacity="0.1" stroke="#58a6ff" stroke-opacity="0.45"/>
  <text x="1245" y="253" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#79b8ff" text-anchor="middle">pestaña facebook.com</text>

  <!-- PASO 2  top 324 -->
  <rect x="64" y="324" width="1312" height="116" rx="16" fill="#0f151d" stroke="#1f2733" stroke-width="1.5"/>
  <rect x="82" y="356" width="6" height="52" rx="3" fill="#6f9dff"/>
  <circle cx="126" cy="382" r="22" fill="#6f9dff" fill-opacity="0.12" stroke="#6f9dff" stroke-width="2"/>
  <text x="126" y="390" font-size="21" font-weight="700" fill="#6f9dff" text-anchor="middle">2</text>
  <text x="172" y="374" font-size="21" font-weight="600" fill="#e6edf3">El hook del mundo MAIN lee en paralelo</text>
  <text x="172" y="404" font-size="16" fill="#8b949e">Lee de forma pasiva las respuestas GraphQL que la página ya pidió — nunca las suyas.</text>
  <rect x="1211" y="365" width="137" height="34" rx="17" fill="#6f9dff" fill-opacity="0.1" stroke="#6f9dff" stroke-opacity="0.45"/>
  <text x="1279" y="387" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#8ab0ff" text-anchor="middle">page-hook.ts</text>

  <!-- PASO 3  top 458 -->
  <rect x="64" y="458" width="1312" height="116" rx="16" fill="#0f151d" stroke="#1f2733" stroke-width="1.5"/>
  <rect x="82" y="490" width="6" height="52" rx="3" fill="#8894ff"/>
  <circle cx="126" cy="516" r="22" fill="#8894ff" fill-opacity="0.12" stroke="#8894ff" stroke-width="2"/>
  <text x="126" y="524" font-size="21" font-weight="700" fill="#8894ff" text-anchor="middle">3</text>
  <text x="172" y="508" font-size="21" font-weight="600" fill="#e6edf3">El content script retransmite</text>
  <text x="172" y="538" font-size="16" fill="#8b949e">Retransmite cada hallazgo por postMessage, escanea el DOM como respaldo y marca el video activo.</text>
  <rect x="1228" y="499" width="120" height="34" rx="17" fill="#8894ff" fill-opacity="0.1" stroke="#8894ff" stroke-opacity="0.45"/>
  <text x="1288" y="521" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#9da8ff" text-anchor="middle">content.ts</text>

  <!-- PASO 4  top 592 -->
  <rect x="64" y="592" width="1312" height="116" rx="16" fill="#0f151d" stroke="#1f2733" stroke-width="1.5"/>
  <rect x="82" y="624" width="6" height="52" rx="3" fill="#a58bff"/>
  <circle cx="126" cy="650" r="22" fill="#a58bff" fill-opacity="0.12" stroke="#a58bff" stroke-width="2"/>
  <text x="126" y="658" font-size="21" font-weight="700" fill="#a58bff" text-anchor="middle">4</text>
  <text x="172" y="642" font-size="21" font-weight="600" fill="#e6edf3">El service worker lo archiva</text>
  <text x="172" y="672" font-size="16" fill="#8b949e">Agrega las pistas de fbcdn de la red, sanea cada elemento y lo guarda por pestaña.</text>
  <rect x="1168" y="633" width="180" height="34" rx="17" fill="#a58bff" fill-opacity="0.1" stroke="#a58bff" stroke-opacity="0.45"/>
  <text x="1258" y="655" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#b8a5ff" text-anchor="middle">service-worker.ts</text>

  <!-- PASO 5  top 726 -->
  <rect x="64" y="726" width="1312" height="116" rx="16" fill="#0f151d" stroke="#1f2733" stroke-width="1.5"/>
  <rect x="82" y="758" width="6" height="52" rx="3" fill="#c284f7"/>
  <circle cx="126" cy="784" r="22" fill="#c284f7" fill-opacity="0.12" stroke="#c284f7" stroke-width="2"/>
  <text x="126" y="792" font-size="21" font-weight="700" fill="#c284f7" text-anchor="middle">5</text>
  <text x="172" y="776" font-size="21" font-weight="600" fill="#e6edf3">El panel lateral lo muestra en vivo</text>
  <text x="172" y="806" font-size="16" fill="#8b949e">Reproduciendo, Biblioteca y Guardados se actualizan en vivo. Elige calidad y toca Descargar.</text>
  <rect x="1211" y="767" width="137" height="34" rx="17" fill="#c284f7" fill-opacity="0.1" stroke="#c284f7" stroke-opacity="0.45"/>
  <text x="1279" y="789" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#d2a3ff" text-anchor="middle">sidepanel.ts</text>

  <!-- PASO 6  top 860 — la bifurcación -->
  <rect x="64" y="860" width="1312" height="116" rx="16" fill="#0f151d" stroke="#3a3320" stroke-width="1.5"/>
  <rect x="82" y="892" width="6" height="52" rx="3" fill="#d2b04c"/>
  <circle cx="126" cy="918" r="22" fill="#d2b04c" fill-opacity="0.12" stroke="#d2b04c" stroke-width="2"/>
  <text x="126" y="926" font-size="21" font-weight="700" fill="#d2b04c" text-anchor="middle">6</text>
  <text x="172" y="910" font-size="21" font-weight="600" fill="#e6edf3">Dos caminos a tu disco</text>
  <text x="172" y="940" font-size="16" fill="#8b949e">Los archivos progresivos se guardan directo; el HD (DASH) pasa primero por el remux.</text>
  <rect x="1176" y="901" width="172" height="34" rx="17" fill="#d2b04c" fill-opacity="0.1" stroke="#d2b04c" stroke-opacity="0.45"/>
  <text x="1262" y="923" font-size="14" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" fill="#e0c56e" text-anchor="middle">chrome.downloads</text>

  <!-- bifurcación del paso 6 hacia las dos tarjetas de resultado -->
  <path d="M720,976 V1000 Q720,1010 710,1010 H360 Q350,1010 350,1020 V1036" fill="none" stroke="#3fb950" stroke-width="2" stroke-opacity="0.75"/>
  <polygon points="343,1034 357,1034 350,1044" fill="#3fb950" fill-opacity="0.85"/>
  <path d="M720,976 V1000 Q720,1010 730,1010 H1080 Q1090,1010 1090,1020 V1036" fill="none" stroke="#d29922" stroke-width="2" stroke-opacity="0.75"/>
  <polygon points="1083,1034 1097,1034 1090,1044" fill="#d29922" fill-opacity="0.85"/>

  <!-- tarjeta A: progresivo -->
  <rect x="80" y="1048" width="560" height="126" rx="16" fill="#0f151d" stroke="#3fb950" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="98" y="1076" width="6" height="70" rx="3" fill="#3fb950"/>
  <text x="126" y="1094" font-size="19" font-weight="700" fill="#3fb950">MP4 progresivo</text>
  <text x="126" y="1124" font-size="15.5" fill="#8b949e">Ya trae su audio — se guarda directo</text>
  <text x="126" y="1148" font-size="15.5" fill="#8b949e">en tu carpeta de Descargas.</text>

  <!-- tarjeta B: DASH -->
  <rect x="800" y="1048" width="560" height="126" rx="16" fill="#0f151d" stroke="#d29922" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="818" y="1076" width="6" height="70" rx="3" fill="#d29922"/>
  <text x="846" y="1094" font-size="19" font-weight="700" fill="#d29922">HD · DASH (los de blob:)</text>
  <text x="846" y="1124" font-size="15.5" fill="#8b949e">offscreen.ts baja las pistas de video y audio,</text>
  <text x="846" y="1148" font-size="15.5" fill="#8b949e">luego ffmpeg.wasm las combina — stream copy, sin recodificar.</text>

  <!-- pie -->
  <text x="720" y="1224" font-size="16" font-style="italic" fill="#6e7681" text-anchor="middle">En ambos casos termina como un .mp4 normal en tu carpeta de Descargas.</text>
</svg>
